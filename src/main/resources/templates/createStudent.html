<th:block th:fragment="content">
<div class="page-header">
    <div>
        <h1 class="title">Add New Student</h1>
        <ul class="breadcrumbs">
            <li><a href="home">Home</a></li>
            <li class="divider">/</li>
            <li><a href="student?action=all">Students</a></li>
            <li class="divider">/</li>
            <li><a href="#" class="active">Add New Student</a></li>
        </ul>
    </div>
    <a href="student" class="btn-secondary">
        <i class='bx bx-arrow-back'></i> Back to Students
    </a>
</div>

<div class="form-container">

    <p class="form-title">Student Information</p>

    <form action="student?action=add" method="POST" class="form-body">

        <div class="form-row">

            <div class="form-group">
                <label for="studentName">Full Name</label>
                <input type="text" name="studentName" id="studentName" required>
            </div>

            <div class="form-group">
                <label for="department" class="form-label">Department</label>
                <select class="form-select" aria-label="Default select example" name="department" required>
                    <th:block th:each="dep : ${depList}">
                        <option value="" th:value="${dep.code}">[[${dep.name}]]</option>
                    </th:block>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="gender">Gender</label>
                <input type="text" id="gender" name="gender" required>
            </div>

            <div class="form-group">
                <label for="address">Address</label>
                <input type="text" id="address" name="address" required> 
            </div>
        </div>

        <div class="form-row">


            <div class="form-group">
                <label for="city">City</label>
                <input type="text" id="city" name="city" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="text" id="phone" name="phone"
                       oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 11);"
                       pattern="^\d{10,11}$"
                       placeholder="Nháº­p 10â€“11 sá»‘"
                       required>
            </div>

            <div class="form-group">
                <label for="birthdate">Date of birth</label>
                <input type="text" id="birthdate" name="birthdate"  pattern="^\d{4}-\d{2}-\d{2}$">
            </div>
        </div>

        <div class="form-buttons">
            <a href="student?action=all" class="btn btn-cancel">Cancel</a>
            <button type="submit" class="btn btn-save">
                <i class='bx bx-save'></i> Add New Student
            </button>
        </div>

    </form>
</div>
</th:block>

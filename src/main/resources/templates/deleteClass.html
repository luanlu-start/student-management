<th:block th:fragment="content">
<div class="page-header">
    <div>
        <h1 class="title">Delete Class</h1>
        <ul class="breadcrumbs">
            <li><a href="home">Home</a></li>
            <li class="divider">/</li>
            <li><a href="classes?action=all">Classes</a></li>
            <li class="divider">/</li>
            <li><a href="#" class="active">Delete Class</a></li>
        </ul>
    </div>
    <a href="classes?action=all" class="btn-secondary">
        <i class='bx bx-arrow-back'></i> Back to Classes
    </a>
</div>

<div class="form-container">
    <p class="form-title" style="color: var(--red);">Are you sure you want to delete this class?</p>
    
    <form action="classes?action=delete" method="POST" class="form-body">
        
        <input type="hidden" name="classId" value="" th:value="${classInfo.id}">

        <div class="alert-box info" style="background-color: #f8d7da; border-color: #f5c2c7; color: #842029;">
            This action cannot be undone. Please confirm the details below.
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Class Code</label>
                <input type="text" value="" th:value="${classInfo.code}" readonly>
            </div>
            <div class="form-group">
                <label>Course</label>
                <input type="text" value="" th:value="${classInfo.course.title}" readonly>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Lecturer</label>
                <input type="text" value="" th:value="${classInfo.lecturer.name}" readonly>
            </div>
            <div class="form-group">
                <label>Semester</label>
                <input type="text" value="${classInfo.semester.code} - ${classInfo.semester.year}" readonly>
            </div>
        </div>

        <div class="form-buttons">
            <a href="classes?action=all" class="btn btn-cancel">Cancel</a>
            
            <button type="submit" class="btn btn-save" style="background-color: var(--red);">
                <i class='bx bx-trash'></i>Delete This Class
            </button>
        </div>
    </form>
</div>
</th:block>

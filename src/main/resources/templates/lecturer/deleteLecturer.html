<link th:href="@{/assets/css/user.css}" rel="stylesheet" type="text/css"/>
<link th:href="@{/assets/css/form.css}" rel="stylesheet" type="text/css"/>
<th:block th:fragment="content">
<div class="page-header">
    <div>
        <h1 class="title">Delete Lecturer</h1>
        <ul class="breadcrumbs">
            <li><a th:href="@{/home}">Home</a></li>
            <li class="divider">/</li>
            <li><a th:href="@{/lecturer}">Lecturers</a></li>
            <li class="divider">/</li>
            <li><a href="#" class="active">Delete Lecturer</a></li>
        </ul>
    </div>
    <a th:href="@{/lecturer}" class="btn-secondary">
        <i class='bx bx-arrow-back'></i> Back to Lecturer
    </a>
</div>

<div class="form-container">

    <p class="form-title">Lecturer Information</p>

    <form th:action="@{/lecturer/delete}" method="POST" class="form-body">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />


        <div class="form-row">
            <div class="form-group">
                <label for="lecturerId">Lecturer ID <span>*</span></label>
                <input type="text" name="id" id="lecturerId" value="" th:value="${lecturer.id}" readonly>
            </div>

            <div class="form-group">
                <label for="lecturerName">Full Name</label>
                <input type="text" name="name" id="lecturerName" value="" th:value="${lecturer.name}" readonly>
            </div>

        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" value="" th:value="${lecturer.title}" readonly>
            </div>

            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="text" id="phone" name="phone" value="" th:value="${lecturer.phone}" readonly>
            </div>
        </div>


        <div class="form-buttons">
            <a th:href="@{/lecturer}" class="btn btn-cancel">Cancel</a>
            <button type="submit" class="btn btn-save">
                <i class='bx bx-save'></i> Delete Lecturer
            </button>
        </div>

    </form>
</div>
</th:block>

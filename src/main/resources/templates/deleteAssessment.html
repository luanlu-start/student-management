<th:block th:fragment="content">
<div class="page-header">
    <div>
        <h1 class="title">Delete Assessment</h1>
        <ul class="breadcrumbs">
            <li><a href="home">Home</a></li>
            <li class="divider">/</li>
            <li><a href="assessment">Assessment</a></li>
            <li class="divider">/</li>
            <li><a href="#" class="active">Delete Assessment</a></li>
        </ul>
    </div>
    <a href="assessment" class="btn-secondary">
        <i class='bx bx-arrow-back'></i> Back to Assessment
    </a>
</div>

<div class="form-container">

    <p class="form-title">Are you sure you want to delete this assessment ?</p>

    <form action="assessment" method="POST" class="form-body">

        <input type="hidden" name="action" value="delete">
        <div class="form-row">
            <div class="form-group">
                <label for="idShow">Assessment ID</label>
                <input hidden="true" type="text" id="id" name="id" 
                       value="" th:value="${assessment.id}" readonly="true"
                       style="background-color: #f8f8f8;">
                <input type="text" id="idShow" name="idShow" 
                       value="" th:value="${assessment.id}" disabled="true"
                       style="background-color: #f8f8f8;">
            </div>
            <div class="form-group">
                <label for="type">Assessment Type </label>
                <input type="text" id="type" name="type" 
                       value="" th:value="${assessment.type}" disabled="true">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="weight">Assessment Weight</label>
                <input type="number" min="0" max="100" id="weight" name="weight" 
                       value="" th:value="${assessment.weight}" disabled="true">
            </div>
            <div class="form-group">
                <th:block th:each="c : ${allCourse}">
                    <th:block th:if="${c.id == assessment.course.id}">
                        <label for="course" class="form-label">Course</label> 
                        <input type="text" id="course" value="" th:value="${c.code}" disabled="true">
                    </th:block>
                </th:block>
            </div>
        </div>

        <div class="form-buttons">
            <a href="assessment" class="btn btn-cancel">Cancel</a>
            <button type="submit" class="btn btn-save">
                <i class='bx bx-save'></i> Delete Assessment
            </button>
        </div>

    </form>
</div>
</th:block>

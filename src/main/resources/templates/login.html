

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
        <title>Login Page</title>
        <link href="bootstrap.min.css" th:href="@{/bootstrap.min.css}" rel="stylesheet" type="text/css"/>
        <link href="login.css" th:href="@{/login.css}" rel="stylesheet" type="text/css"/>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    </head>
    <body>

 <div class="login-container">
        <div class="login-card">
            <form action="login?action=login" th:action="@{/login(action='login')}" method="POST">
                <div class="login-header">
                    <div class="material-logo">
                        <div>
                            <img src="fpt.png" th:src="@{/fpt.png}" class="fpt-logo"/>
                        </div>
                    </div>
                    <h2>Sign in to Dashboard</h2>
                    <p>to continue to your account</p>
                </div>
                <div class="login-form">
                    <div class="form-group">
                        <div class="input-wrapper">
                            <input type="text" id="username" name="username" value="" th:value="${cookie.username.value}" required>
                            <label for="username">Username</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="input-wrapper password-wrapper">
                            <input type="password" id="password" name="password" required>
                            <label for="password">Password</label>
                        </div>
                    </div>

                    <div class="form-options">
                        <div class="checkbox-wrapper">
                            <input type="checkbox" id="remember" name="remember">
                            <label for="remember" class="checkbox-label">
                                <div class="checkbox-material">
                                    <div class="checkbox-ripple"></div>
                                    <svg class="checkbox-icon" viewBox="0 0 24 24">
                                    <path class="checkbox-path" d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                                    </svg>
                                </div>
                                Keep me signed in
                            </label>
                        </div>
                        <a href="#" class="forgot-password">Forgot password?</a>
                    </div>

                    <button type="submit" class="login-btn material-btn">
                        <div class="btn-ripple"></div>
                        <span class="btn-text">SIGN IN</span>
                        <div class="btn-loader">
                            <svg class="loader-circle" viewBox="0 0 50 50">
                            <circle class="loader-path" cx="25" cy="25" r="12" fill="none" stroke="currentColor" stroke-width="3"/>
                            </svg>
                        </div>
                    </button>

                    <div class="divider">
                        <span>or</span>
                    </div>

                    <div class="signup-link">
                        <p>Don't have an account? <a href="#" class="create-account">Create account</a></p>
                    </div>
                            
                </div>
            </form>
        </div>
        <th:block th:if="${not empty error}">
            <p class="alert alert-danger">[[${error}]]</p>
        </th:block>
    </div>
</body>
</html>

<th:block th:fragment="content">
<div class="page-header">
    <div>
        <h1 class="title">Add New Department</h1>
        <ul class="breadcrumbs">
            <li><a href="home">Home</a></li>
            <li class="divider">/</li>
            <li><a href="department?action=all">Departments</a></li>
            <li class="divider">/</li>
            <li><a href="#" class="active">Add New Department</a></li>
        </ul>
    </div>
    <a href="department" class="btn-secondary">
        <i class='bx bx-arrow-back'></i> Back to Departments
    </a>
</div>

<div class="form-container">

    <p class="form-title">Department Information</p>

    <form action="department?action=add" method="POST" class="form-body">

        <div class="form-row">
            <div class="form-group">
                <label for="departmentCode">Department Code</label>
                <input type="text" name="departmentCode" id="departmentCode" required>
            </div>

            <div class="form-group">
                <label for="departmentName">Department Name</label>
                <input type="text" name="departmentName" id="departmentName" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="departmentHead">Department Head</label>
                <input type="text" id="departmentHead" name="departmentHead">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="text" id="email" name="email">
            </div>
        </div>

        <div class="form-row">              
            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="text" id="phone" name="phone"> 
            </div>
        </div>

        <div class="form-buttons">
            <a href="department?action=all" class="btn btn-cancel">Cancel</a>
            <button type="submit" class="btn btn-save">
                <i class='bx bx-save'></i> Add New Department
            </button>
        </div>

    </form>
</div>
</th:block>

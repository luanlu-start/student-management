<link th:href="@{/assets/css/department.css}" rel="stylesheet" type="text/css"/>
<link th:href="@{/assets/css/form.css}" rel="stylesheet" type="text/css"/>
<th:block th:fragment="content">
<<<<<<< HEAD
    <div class="page-header">
        <div>
            <h1 class="title">Add New Department</h1>
            <ul class="breadcrumbs">
                <li><a th:href="@{/home}">Home</a></li>
                <li class="divider">/</li>
                <li><a th:href="@{/department}">Departments</a></li>
                <li class="divider">/</li>
                <li><a href="#" class="active">Add New Department</a></li>
            </ul>
        </div>
        <a th:href="@{/department}" class="btn-secondary">
            <i class='bx bx-arrow-back'></i> Back to Departments
        </a>
    </div>

    <th:block th:if="${message != null and !#strings.isEmpty(message)}">
        <div class="alert" th:classappend="' alert-' + ${messageType}">
            [[${message}]]
        </div>
    </th:block>

    <div class="form-container">

        <p class="form-title">Department Information</p>

        <form th:action="@{/department/add}"
              th:object="${department}"
              method="post"
              class="form-body">

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div>
                <div class="form-group">
                    <label for="departmentCode">Department Code </label>
                    <input type="text" id="departmentCode" th:field="*{code}" required>
                    <small class="text-danger" th:errors="*{code}"></small>
                </div>

                <div class="form-group">
                    <label for="departmentName">Department Name</label>
                    <input type="text" id="departmentName" th:field="*{name}" required>
                    <small class="text-danger" th:errors="*{name}"></small>
                </div>
            </div>

            <div>
                <div class="form-group">
                    <label for="departmentHead">Department Head</label>
                    <input type="text" id="departmentHead" th:field="*{head}" required>
                    <small class="text-danger" th:errors="*{head}"></small>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="text" id="email" th:field="*{email}" required>
                    <small class="text-danger" th:errors="*{email}"></small>
                </div>
            </div>

            <div>
                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="text" id="phone" th:field="*{phone}"
                           pattern="^\d{10,11}$" title="Please enter 10 or 11 digits.">
                    <small class="text-danger" th:errors="*{phone}"></small>
                </div>
            </div>

            <div class="form-buttons">
                <a th:href="@{/department}" class="btn btn-cancel">Cancel</a>
                <button type="submit" class="btn btn-save">
                    <i class='bx bx-save'></i> Add New Department
                </button>
            </div>

        </form>
    </div>
</th:block>

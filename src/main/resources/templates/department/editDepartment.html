<link th:href="@{/assets/css/department.css}" rel="stylesheet" type="text/css"/>
<link th:href="@{/assets/css/form.css}" rel="stylesheet" type="text/css"/>
<th:block th:fragment="content">
<div class="page-header">
    <div>
        <h1 class="title">Edit Department</h1>
        <ul class="breadcrumbs">
            <li><a th:href="@{/home}">Home</a></li>
            <li class="divider">/</li>
            <li><a th:href="@{/department}">Departments</a></li>
            <li class="divider">/</li>
            <li><a href="#" class="active">Edit Department</a></li>
        </ul>
    </div>
    <a th:href="@{/department}" class="btn-secondary">
        <i class='bx bx-arrow-back'></i> Back to Departments
    </a>
</div>

<div class="form-container">

    <p class="form-title">Department Information</p>

    <form th:action="@{/department/edit}" method="post" class="form-body">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="form-row">
            <div class="form-group">
                <label for="departmentName">Department Name <span>*</span></label>
                <input type="text" id="departmentName" name="name"
                       value="" th:value="${editDepartment.name}" required>
            </div>
            <div class="form-group">
                <label for="departmentCode">Department Code (Read-only)</label>
                <input type="text" id="departmentCode" name="code"
                       value="" th:value="${editDepartment.code}" readonly
                       style="background-color: #f8f8f8;">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="departmentHead">Department Head</label>
                <input type="text" id="departmentHead" name="departmentHead" 
                       value="" th:value="${editDepartment.departmentHead}" placeholder="Enter head of department's name" required>
            </div>
            <div class="form-group">
                <label for="email">Department Email</label>
                <input type="email" id="email" name="email" 
                       value="" th:value="${editDepartment.email}" placeholder="Enter department email" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" 
                       value="" th:value="${editDepartment.phone}" placeholder="Enter phone number"
                       pattern="^\d{10,11}$" title="Please enter 10 or 11 digits." required>
            </div>
            <div class="form-group">
            </div>
        </div>

        <div class="form-buttons">
            <a th:href="@{/department}" class="btn btn-cancel">Cancel</a>
            <button type="submit" class="btn btn-save">
                <i class='bx bx-save'></i> Update Department
            </button>
        </div>
    </form>
</div>
</th:block>

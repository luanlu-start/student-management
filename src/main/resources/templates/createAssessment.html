<th:block th:fragment="content">
<div class="page-header">
    <div>
        <h1 class="title">Add New Assessment</h1>
        <ul class="breadcrumbs">
            <li><a href="home">Home</a></li>
            <li class="divider">/</li>
            <li><a href="assessment?action=all">Assessment</a></li>
            <li class="divider">/</li>
            <li><a href="#" class="active">Add New Assessment</a></li>
        </ul>
    </div>
    <a href="assessment?action=all" class="btn-secondary">
        <i class='bx bx-arrow-back'></i> Back to Assessment
    </a>
</div>

<div class="form-container">

    <p class="form-title">Assessment Information</p>

    <form action="assessment?action=create" method="POST" class="form-body">

        <div class="form-row">
            <div class="form-group">
                <label for="type">Assessment Type</label>
                <select name="type" id="type" required>
                    <option value="">-- Select Type --</option>
                    <option value="Assignment">Assignment</option>
                    <option value="Quiz">Quiz</option>
                    <option value="Midterm Exam">Midterm Exam</option>
                    <option value="Final Exam">Final Exam</option>
                    <option value="Project">Project</option>
                    <option value="Presentation">Presentation</option>
                    <option value="Lab Work">Lab Work</option>
                    <option value="Practical Exam">Practical Exam</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="weight">Assessment Weight (%)</label>
                <input type="number" min="0" max="100" id="weight" name="weight" placeholder="0-100" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="courseId" class="form-label">Course</label>
                <select name="courseId" id="courseId" required>
                    <option value="">-- Select Course --</option>
                    <th:block th:each="c : ${allCourse}">
                        <option value="" th:value="${c.id}" 
                                ${c.id == preSelectedCourseId ? 'selected' : ''}>
                            [[${c.code}]]
                        </option>
                    </th:block>
                </select>
            </div>
            <div class="form-group">
                <!-- Empty space for alignment -->
            </div>
        </div>

        <div class="form-buttons">
            <a href="assessment?action=all" class="btn btn-cancel">Cancel</a>
            <button type="submit" class="btn btn-save">
                <i class='bx bx-save'></i> Add New Assessment
            </button>
        </div>

    </form>
</div>
</th:block>

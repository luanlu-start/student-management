<th:block th:fragment="content">
<div class="page-header">
    <div>
        <h1 class="title">Edit Lecturer</h1>
        <ul class="breadcrumbs">
            <li><a href="home">Home</a></li>
            <li class="divider">/</li>
            <li><a href="department?action=list">Lecturers</a></li>
            <li class="divider">/</li>
            <li><a href="#" class="active">Edit Lecturer</a></li>
        </ul>
    </div>
    <a href="lecturer" class="btn-secondary">
        <i class='bx bx-arrow-back'></i> Back to Lecturers
    </a>
</div>

<div class="form-container">

    <p class="form-title">Lecturer Information</p>

    <form action="lecturer" method="POST" class="form-body">

        <input type="hidden" name="action" value="edit">

        <div class="form-row">
            <div class="form-group">
                <label for="lecturerID">Lecturer ID <span>*</span></label>
                <input type="text" id="lecturerID" name="lecturerID" value="" th:value="${lecturer.id}" readonly>
            </div>
            <div class="form-group">
                <label for="lecturerName">Lecturer Name</label>
                <input type="text" id="lecturerName" name="lecturerName" value="" th:value="${lecturer.name}" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="departmentHead">Email</label>
                <input type="email" id="email" name="email" value="" th:value="${lecturer.email}">
            </div>
              <div class="form-group">
                <label class="form-label">Department</label>
                <select class="form-select" aria-label="Default select example" name="depCode">
                    <th:block th:each="dep : ${departmentList}">
                        <option value="" th:value="${dep.code}" <th:block th:if="${lecturer.department.code == dep.code}">selected</th:block>>[[${dep.name}]]</option>
                    </th:block>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" value="" th:value="${lecturer.title}">
            </div>
            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="text" id="phone" name="phone" value="" th:value="${lecturer.phone}">
            </div>
        </div>

        <div class="form-buttons">
            <a href="lecturer?action=all" class="btn btn-cancel">Cancel</a>
            <button type="submit" class="btn btn-save">
                <i class='bx bx-save'></i> Update Lecturer
            </button>
        </div>

    </form>
</div>
</th:block>

<div class="lecturer-page">

    <div class="dashboard-content">

        <!-- PAGE HEADER -->
        <div class="page-header">

            <div class="header-left">
                <h1>All Lecturers</h1>

                <div class="breadcrumbs">
                    <a th:href="@{/}">Home</a>
                    <span>/</span>
                    <span>Lecturers</span>
                </div>


            </div>

            <div><a th:href="@{/lecturer/add}" class="btn-add-new btn-add-rect">
                <i class="bx bx-plus"></i> Add New Lecturer
            </a></div>
        </div>


    </div>

    <div class="filter-bar">

        <div class="filter-inline">
            <input type="text" placeholder="Search lecturers...">

            <select>
                <option>All Departments</option>
            </select>

            <button class="btn-search">Search</button>
        </div>

        <!-- ADD BUTTON -->


    </div>

    <div class="user-grid">

        <div class="user-card"
             th:each="lecturer : ${lecturerPage.content}">

            <!-- Avatar -->
            <div class="card-avatar"
                 th:style="'background-color:#' + ${T(java.lang.Math).abs(lecturer.name.hashCode()) % 999999}">
                <span th:text="${#strings.substring(lecturer.name,0,1)}"></span>
            </div>

            <!-- Info -->
            <div class="card-info">

                <div class="card-name"
                     th:text="${lecturer.title + ' ' + lecturer.name}">
                </div>

                <div class="card-detail"
                     th:text="${lecturer.department != null ? lecturer.department.name : 'No Department'}">
                </div>

                <div class="card-detail-role">
                    <span>Email </span>
                    <span th:text="${lecturer.email}"></span>
                </div>

            </div>

            <!-- Buttons -->
            <div class="card-buttons">

                <a th:href="@{/lecturer/view/{id}(id=${lecturer.id})}"
                   class="btn-card btn-view">
                    <i class='bx bx-show'></i> View
                </a>

                <a th:href="@{/lecturer/edit/{id}(id=${lecturer.id})}"
                   class="btn-card btn-edit">
                    <i class='bx bx-edit'></i> Edit
                </a>

                <a th:href="@{/lecturer/delete/{id}(id=${lecturer.id})}"
                   onclick="return confirm('Delete?')"
                   class="btn-card btn-delete">
                    <i class='bx bx-trash'></i> Delete
                </a>

            </div>

        </div>

    </div>

    <nav aria-label="Page navigation">

        <ul class="pagination justify-content-center">

            <!-- Previous -->
            <li class="page-item"
                th:classappend="${lecturerPage.first} ? 'disabled'">

                <a class="page-link"
                   th:href="@{/lecturer/list(page=${lecturerPage.number - 1})}">

                    <i class='bx bx-chevron-left'></i>

                </a>

            </li>


            <!-- Page numbers -->
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, lecturerPage.totalPages - 1)}"
                th:classappend="${lecturerPage.number == i} ? 'active'">

                <a class="page-link"
                   th:href="@{/lecturer/list(page=${i})}"
                   th:text="${i + 1}">
                </a>

            </li>


            <!-- Next -->
            <li class="page-item"
                th:classappend="${lecturerPage.last} ? 'disabled'">

                <a class="page-link"
                   th:href="@{/lecturer/list(page=${lecturerPage.number + 1})}">

                    <i class='bx bx-chevron-right'></i>

                </a>

            </li>

        </ul>

    </nav>




</div>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragment/frag :: head}"></head>

<body>

<!-- PAGE HEADER -->
<div class="page-header">
    <div>
        <h1 class="title"
            th:text="${student.id == 0 || student.id == null
              ? 'Add New Student'
              : 'Edit Student'}">
        </h1>

        <ul class="breadcrumbs">
            <li><a th:href="@{/}">Home</a></li>
            <li class="divider">/</li>
            <li><a th:href="@{/student/list}">Students</a></li>
            <li class="divider">/</li>
            <li>
                <a href="#"
                   class="active"
                   th:text="${student.id == 0 || student.id == null
                 ? 'Add New Student'
                 : 'Edit Student'}">
                </a>
            </li>

        </ul>
    </div>

    <a th:href="@{/student/list}" class="btn btn-back">
        <i class='bx bx-arrow-back'></i> Back to Students
    </a>

</div>

<!-- CENTER PAGE -->
<div class="form-page">

    <div class="form-container">

        <p class="form-title">Student Information</p>

        <form th:action="@{/student/save}"
              th:object="${student}"
              method="post"
              class="form-body">

            <!-- QUAN TRỌNG: GIỮ ID KHI EDIT -->
            <input type="hidden" th:field="*{id}" />

            <!-- ROW 1 -->
            <div class="form-row">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" th:field="*{name}" placeholder="Enter student name">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" th:field="*{email}" placeholder="Enter email">
                </div>
            </div>

            <!-- ROW 2 -->
            <div class="form-row">
                <div class="form-group">
                    <label>Gender</label>
                    <select th:field="*{gender}">
                        <option value="">-- Select Gender --</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Department</label>
                    <select th:field="*{department}">
                        <option value="">-- Select Department --</option>
                        <option th:each="dept : ${listDepartments}"
                                th:value="${dept.code}"
                                th:text="${dept.name}">
                        </option>
                    </select>
                </div>
            </div>

            <!-- ROW 3 -->
            <div class="form-row">
                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" th:field="*{phone}" placeholder="Enter phone number">
                </div>
                <div class="form-group"></div>
            </div>

            <!-- BUTTONS -->
            <div class="form-buttons">
                <a th:href="@{/student/list}" class="btn btn-cancel">Cancel</a>
                <button type="submit" class="btn btn-save">
                    <i class='bx bx-save'></i>
                    <span th:text="${student.id == 0 || student.id == null
                     ? 'Save'
                     : 'Update'}"></span>
                </button>

            </div>

        </form>
    </div>
</div>

</body>
</html>

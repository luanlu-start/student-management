<div class="student-page">
    <div class="dashboard-content">
        <div class="page-header">
            <div class="header-left">
                <h1>All Students</h1>
                <div class="breadcrumbs">
                    <a th:href="@{/}">Home</a>
                    <span>/</span>
                    <span>All Students</span>
                </div>
            </div>

            <div class="header-right">
                <div class="filter-inline">
                    <input type="text" placeholder="Search students...">
                    <select>
                        <option>All Departments</option>
                    </select>
                    <button class="btn-search">Search</button>
                </div>

                <!-- ADD NEW BUTTON -->
                <a th:href="@{/student/add}" class="btn-add-new btn-add-rect">
                    <i class="bx bx-plus"></i> Add New Student
                </a>

            </div>
        </div>


        <div class="user-grid">

            <div class="user-card" th:each="student : ${listStd}">

                <div class="card-avatar"
                     th:style="'background-color:#' + ${T(java.lang.Math).abs(student.name.hashCode()) % 999999}">
                    <span th:text="${student.name != null ? #strings.substring(student.name,0,1) : '?'}"></span>
                </div>

                <div class="card-info">
                    <h3 th:text="${student.name}"></h3>
                    <p th:text="${student.department != null ? student.department.name : '(No Department)'}"></p>
                    <small>
                        Gender:
                        <span th:text="${student.gender}"></span>
                    </small>
                </div>

                <div class="card-buttons">
                    <a th:href="@{/student/edit/{id}(id=${student.id})}" class="btn-edit">Edit</a>
                    <a th:href="@{/student/delete/{id}(id=${student.id})}"
                       onclick="return confirm('Delete?')" class="btn-delete">Delete</a>
                </div>

            </div>

        </div>

    </div>

</div>

<div class="student-page">
    <div class="dashboard-content">
        <div class="page-header">
            <div class="header-left">
                <h1>All Students</h1>
                <div class="breadcrumbs">
                    <a th:href="@{/}">Home</a>
                    <span>/</span>
                    <span>All Students</span>
                </div>
            </div>

            <div>
                <a th:href="@{/student/add}" class="btn-add-new btn-add-rect">
                    <i class="bx bx-plus"></i> Add New Student
                </a></div>

        </div>

        <div class="filter-bar">
            <div class="filter-inline">
                <input type="text" placeholder="Search students...">
                <select>
                    <option>All Departments</option>
                </select>
                <button class="btn-search">Search</button>
            </div>

            <!-- ADD NEW BUTTON -->

        </div>


        <div class="user-grid">

            <div class="user-card" th:each="student : ${studentPage}">

                <div class="card-avatar"
                     th:style="'background-color:#' + ${T(java.lang.Math).abs(student.name.hashCode()) % 999999}">
                    <span th:text="${student.name != null ? #strings.substring(student.name,0,1) : '?'}"></span>
                </div>

                <div class="card-info">
                    <h3 th:text="${student.name}"></h3>
                    <p th:text="${student.department != null ? student.department.name : '(No Department)'}"></p>
                    <small>
                        Gender:
                        <span th:text="${student.gender}"></span>
                    </small>
                </div>

                <div class="card-buttons">
                    <a th:href="@{/student/edit/{id}(id=${student.id})}" class="btn-card btn-edit"><i
                            class='bx bx-edit'></i> Edit</a>
                    <a th:href="@{/student/delete/{id}(id=${student.id})}"
                       onclick="return confirm('Delete?')" class="btn-card btn-delete"> <i class='bx bx-trash'></i>Delete</a>


                </div>

            </div>

        </div>

        <nav aria-label="Page navigation">

            <ul class="pagination justify-content-center">

                <!-- Previous -->
                <li class="page-item"
                    th:classappend="${studentPage.first} ? 'disabled'">

                    <a class="page-link"
                       th:href="@{/student/list(page=${studentPage.number - 1})}">

                        <i class='bx bx-chevron-left'></i>

                    </a>

                </li>


                <!-- Page numbers -->
                <li class="page-item"
                    th:each="i : ${#numbers.sequence(0, studentPage.totalPages - 1)}"
                    th:classappend="${studentPage.number == i} ? 'active'">

                    <a class="page-link"
                       th:href="@{/student/list(page=${i})}"
                       th:text="${i + 1}">
                    </a>

                </li>


                <!-- Next -->
                <li class="page-item"
                    th:classappend="${studentPage.last} ? 'disabled'">

                    <a class="page-link"
                       th:href="@{/student/list(page=${studentPage.number + 1})}">

                        <i class='bx bx-chevron-right'></i>

                    </a>

                </li>

            </ul>

        </nav>

    </div>

</div>

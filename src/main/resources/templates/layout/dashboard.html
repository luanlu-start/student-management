<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragment/frag :: head}"></head>

<body>

<!-- SIDEBAR -->
<section id="sidebar">
    <a th:href="@{/}" class="brand">
        <i>
            <img class="admin-logo" th:src="@{/assets/img/adminLogo.png}" alt=""/>
        </i>
        Uni System
    </a>

    <ul class="side-menu">
        <li>
            <a th:href="@{/}" class="active">
                <i class="bx bxs-dashboard icon"></i> Dashboard
            </a>
        </li>

        <li class="divider" data-text="Academic">Academic</li>

        <li>
            <a href="#">
                <i class='bx bxs-user-account icon'></i>
                Lecturers
                <i class="bx bx-chevron-right icon-right"></i>
            </a>
            <ul class="side-dropdown">
                <li><a th:href="@{/lecturer/list}">All Lecturers</a></li>
                <li><a th:href="@{/lecturer/add}">Add Lecturer</a></li>
            </ul>
        </li>

        <li>
            <a href="#">
                <i class='bx bxs-group icon'></i> Students
                <i class="bx bx-chevron-right icon-right"></i>
            </a>
            <ul class="side-dropdown">
                <li><a th:href="@{/student/list}">All Students</a>
                </li>
                <li><a th:href="@{/student/add}">Add Student</a>
                </li>
            </ul>
        </li>

        <li class="logout-bottom">
            <a th:href="@{/logout}" class="logout">
                <i class='bx bx-log-out icon'></i> Log Out
            </a>
        </li>
    </ul>
</section>

<!-- CONTENT -->
<section id="content">

    <!-- NAVBAR -->
    <nav>
        <i class="bx bx-menu toggle-sidebar"></i>

        <form>
            <div class="form-group">
                <input type="text" placeholder="Search..."/>
                <i class="bx bx-search icon"></i>
            </div>
        </form>

        <span class="divider"></span>

        <div class="profile">
            <div class="avatar">
                <span th:text="'U'"></span>
            </div>
            <span class="profile-name">Guest</span>
            <i class='bx bx-chevron-down arrow'></i>

            <ul class="profile-link">
                <li><a href="#"><i class="bx bxs-user-circle icon"></i> Profile</a></li>
                <li><a href="#"><i class="bx bxs-cog icon"></i> Settings</a></li>
                <li><a th:href="@{/logout}" class="logout">
                    <i class='bx bx-log-out icon'></i> Logout</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- MAIN -->
    <main id="dashboard-main">

        <div class="dashboard-wrapper"
             th:replace="~{${view}}">
        </div>

    </main>


</section>

<script th:src="@{/assets/js/dashboard.js}"></script>
</body>
</html>

<th:block th:fragment="content">
<div class="page-header">
    <div>
        <h1 class="title">Add New Class</h1>
        <ul class="breadcrumbs">
            <li><a href="home">Home</a></li>
            <li class="divider">/</li>
            <li><a href="classes?action=all">Classes</a></li>
            <li class="divider">/</li>
            <li><a href="#" class="active">Add Class</a></li>
        </ul>
    </div>
    <a href="classes?action=all" class="btn-secondary">
        <i class='bx bx-arrow-back'></i> Back to Classes
    </a>
</div>

<div class="form-container">
    <p class="form-title">New Class Information</p>
    
    <form action="classes" method="POST" class="form-body">
        
        <input type="hidden" name="action" value="add">

        <div class="form-row">
            <div class="form-group full-width">
                <label for="code">Class Code <span>*</span></label>
                
                <input type="text" id="code" name="code" 
                       placeholder="E.g: PRO192.FA24.SE1801" 
                       pattern="[A-Z]{3}[0-9]{3}\.[A-Z]{2}[0-9]{2}\.[A-Z]{2}[0-9]{4}"
                       title="Must match format: XXX123.XX12.XX1234 (e.g., PRO192.FA24.SE1801)"
                       required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="courseId">Course <span>*</span></label>
                <select id="courseId" name="courseId" class="form-select" required>
                    <option value="" disabled selected>-- Select a Course --</option>
                    <th:block th:each="course : ${listCourses}">
                        <option value="" th:value="${course.id}">[[${course.code}]] - [[${course.title}]]</option>
                    </th:block>
                </select>
            </div>
            <div class="form-group">
                <label for="semesterId">Semester <span>*</span></label>
                <select id="semesterId" name="semesterId" class="form-select" required>
                    <option value="" disabled selected>-- Select a Semester --</option>
                    <th:block th:each="sem : ${listSemesters}">
                        <option value="" th:value="${sem.id}">[[${sem.code}]] - [[${sem.year}]]</option>
                    </th:block>
                </select>
            </div>
        </div>

        <div class="form-row" style="grid-template-columns: 2fr 1fr 1fr;">
             <div class="form-group">
                <label for="lecturerId">Lecturer <span>*</span></label>
                <select id="lecturerId" name="lecturerId" class="form-select" required>
                    <option value="" disabled selected>-- Select a Lecturer --</option>
                    <th:block th:each="lec : ${listLecturers}">
                        <option value="" th:value="${lec.id}">[[${lec.name}]] ([[${lec.email}]])</option>
                    </th:block>
                </select>
            </div>
            <div class="form-group">
                <label for="room">Room</label>
                
                <input type="text" id="room" name="room" 
                       placeholder="E.g: BE.301"
                       pattern="[A-Z]{2}\.[0-9]{3}"
                       title="Must match format: XX.123 (e.g., BE.301) or be empty">
            </div>
            <div class="form-group">
                <label for="schedule">Schedule</label>
                
                <input type="text" id="schedule" name="schedule" 
                       placeholder="E.g: Mon(7-9), Wed(7-9)"
                       pattern="[A-Za-z0-9(),\- ]+"
                       title="Can only contain letters, numbers, commas, hyphens, and parentheses ( )">
            </div>
        </div>

        <div class="form-buttons">
            <a href="classes?action=all" class="btn btn-cancel">Cancel</a>
            <button type="submit" class="btn btn-save">
                <i class='bx bx-plus'></i> Add New Class
            </button>
        </div>
    </form>
</div>
</th:block>

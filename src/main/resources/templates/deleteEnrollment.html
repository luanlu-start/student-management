<th:block th:fragment="content">
<div class="page-header">
    <div>
        <h1 class="title">Delete Enrollment</h1>
        <ul class="breadcrumbs">
            <li><a href="home">Home</a></li>
            <li class="divider">/</li>
            <li><a href="classes">Classes</a></li>
            <li class="divider">/</li>
            <li><a href="#" class="active">Delete Enrollment</a></li>
        </ul>
    </div>
    <a href="classes" class="btn-secondary">
        <i class='bx bx-arrow-back'></i> Back to Classes
    </a>
</div>

<div class="form-container">

    <p class="form-title">Are you sure you want to delete this enrollment ?</p>

    <form action="enrollment" method="POST" class="form-body">

        <input type="hidden" name="action" value="confirmDeleteStudent">
        <div class="form-row">
            <div class="form-group">
                <label for="idShow">Student ID</label>
                <input hidden="true" type="text" id="studentId" name="studentId" 
                       value="" th:value="${student.id}" readonly="true"
                       style="background-color: #f8f8f8;">
                <input type="text" id="idShow" name="idShow" 
                       value="" th:value="${student.id}" disabled="true"
                       style="background-color: #f8f8f8;">
            </div>
            <div class="form-group">
                <label for="name">Student Name </label>
                <input type="text" id="name" name="name" 
                       value="" th:value="${student.name}" disabled="true">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="ClassIdShow">Class ID</label>
                <input type="text" id="ClassIdShow" name="ClassIdShow" 
                       value="" th:value="${classes.id}" disabled="true">
                <input type="text" id="classId" name="classId" 
                       value="" th:value="${classes.id}" hidden="true" readonly="true">
            </div>
            <div class="form-group">
                <label for="code">Class Code </label>
                <input type="text" id="code" name="code" 
                       value="" th:value="${classes.code}" disabled="true">
            </div>
        </div>

        <div class="form-buttons">
            <a href="classes" class="btn btn-cancel">Cancel</a>
            <button type="submit" class="btn btn-save">
                <i class='bx bx-save'></i> Delete Enrollment
            </button>
        </div>

    </form>
</div>
</th:block>

<th:block th:fragment="content">
<div class="page-header">
    <div>
        <h1 class="title">Delete Department</h1>
        <ul class="breadcrumbs">
            <li><a href="home">Home</a></li>
            <li class="divider">/</li>
            <li><a href="department?action=list">Departments</a></li>
            <li class="divider">/</li>
            <li><a href="#" class="active">Delete Department</a></li>
        </ul>
    </div>
    <a href="lecturer" class="btn-secondary">
        <i class='bx bx-arrow-back'></i> Back to Department
    </a>
</div>

<div class="form-container">

    <p class="form-title">Department Information</p>

    <form action="department?action=delete" method="POST" class="form-body">

        <div class="form-row">
            <div class="form-group">
                <label for="depCode">Department Code <span>*</span></label>
                <input type="text" name="depCode" id="depCode" value="" th:value="${department.code}" readonly>
            </div>

            <div class="form-group">
                <label for="departmentName">Department Name</label>
                <input type="text" name="departmentName" id="departmentName" value="" th:value="${department.name}" readonly>
            </div>

        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="departmentHead">Department Head</label>
                <input type="text" id="departmentHead" name="departmentHead" value="" th:value="${department.departmentHead}" readonly> 
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="text" id="email" name="email" value="" th:value="${department.email}" readonly>
            </div>
        </div>

        <div class="form-row">           
            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="text" id="phone" name="phone" value="" th:value="${department.phone}" readonly>
            </div>
        </div>


        <div class="form-buttons">
            <a href="department?action=all" class="btn btn-cancel">Cancel</a>
            <button type="submit" class="btn btn-save">
                <i class='bx bx-save'></i> Delete Department
            </button>
        </div>

    </form>
</div>
</th:block>

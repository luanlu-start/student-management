<th:block th:fragment="content">
<div class="page-header">
    <div>
        <h1 class="title">Edit Course</h1>
        <ul class="breadcrumbs">
            <li><a href="home">Home</a></li>
            <li class="divider">/</li>
            <li><a href="department?action=list">Courses</a></li>
            <li class="divider">/</li>
            <li><a href="#" class="active">Edit Course</a></li>
        </ul>
    </div>
    <a href="department" class="btn-secondary">
        <i class='bx bx-arrow-back'></i> Back to Courses
    </a>
</div>

<div class="form-container">
    
    <p class="form-title">Course Information</p>
    
    <form action="course?action=update" method="POST" class="form-body">
        
        <input type="hidden" name="id" value="" th:value="${course.id}">

        <div class="form-row">
            <div class="form-group">
                <label for="code">Course Code <span>*</span></label>
                <input type="text" id="code" name="code" 
                        value="" th:value="${course.code}" required>
            </div>
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" value="" th:value="${course.title}">                    
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="credits">Credits</label>
                <input type="text" id="credits" name="credits" value="" th:value="${course.credits}">
            </div>
             <div class="form-group">
                <label for="departmentCode">Department Code</label>
                <input type="text" id="departmentCode" name="departmentCode" value="" th:value="${course.department.code}">
            </div>
        </div>

        <div class="form-buttons">
            <a href="course?action=all" class="btn btn-cancel">Cancel</a>
            <button type="submit" class="btn btn-save">
                <i class='bx bx-save'></i> Update Course
            </button>
        </div>
        
    </form>
</div>
</th:block>

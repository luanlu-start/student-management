<link th:href="@{/assets/css/form.css}" rel="stylesheet" type="text/css"/>
<th:block th:fragment="content">
<div class="page-header">
    <div>
        <h1 class="title">Delete Mark</h1>
        <ul class="breadcrumbs">
            <li><a th:href="@{/home}">Home</a></li>
            <li class="divider">/</li>
            <li><a th:href="@{|/mark/viewByClass?classId=${classId}|}" th:if="${classId != null and !#strings.isEmpty(classId)}">Manage Grades</a></li>
            <li><a th:href="@{/classes}" th:if="${classId == null or #strings.isEmpty(classId)}">Classes</a></li>
            <li class="divider">/</li>
            <li><a href="#" class="active">Delete Mark</a></li>
        </ul>
    </div>

    <a th:href="@{|/mark/viewByClass?classId=${classId}|}" th:if="${classId != null and !#strings.isEmpty(classId)}" class="btn-secondary">
        <i class='bx bx-arrow-back'></i> Back to Gradebook
    </a>
    <a th:href="@{/classes}" th:if="${classId == null or #strings.isEmpty(classId)}" class="btn-secondary">
        <i class='bx bx-arrow-back'></i> Back to Classes
    </a>
</div>

<div class="form-container">
    <p class="form-title" style="color: var(--red);">Are you sure you want to delete this mark?</p>

    <form th:action="@{/mark/delete}" method="POST" class="form-body">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <input type="hidden" name="classId" th:if="${classId != null and !#strings.isEmpty(classId)}" th:value="${classId}">
        <input type="hidden" name="enrollId" th:value="${mark.enrollment.id}">
        <input type="hidden" name="assessmentId" th:value="${mark.assessment.id}">

        <div class="alert-box info" style="background-color: #f8d7da; border-color: #f5c2c7; color: #842029;">
            This action cannot be undone. Please confirm the details below.
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Student</label>
                <input type="text" th:value="${mark.enrollment.student.name}" readonly>
            </div>
            <div class="form-group">
                <label>Course</label>
                <input type="text" th:value="${mark.enrollment.cls.course.title}" readonly>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Assessment</label>
                <input type="text" th:value="${mark.assessment.type + ' (' + mark.assessment.weight + '%)'}" readonly>
            </div>
            <div class="form-group">
                <label>Mark</label>
                <input type="text" th:value="${mark.mark}" readonly>
            </div>
        </div>

        <div class="form-buttons">
            <a th:href="@{|/mark/viewByClass?classId=${classId}|}" th:if="${classId != null and !#strings.isEmpty(classId)}" class="btn btn-cancel">Cancel</a>
            <a th:href="@{/classes}" th:if="${classId == null or #strings.isEmpty(classId)}" class="btn btn-cancel">Cancel</a>
            <button type="submit" class="btn btn-save" style="background-color: var(--red);">
                <i class='bx bx-trash'></i> Yes, Delete This Mark
            </button>
        </div>
    </form>
</div>
</th:block>

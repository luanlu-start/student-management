<th:block th:fragment="content">
<div class="page-header">
    <div>
        <h1 class="title">Edit Mark</h1>
        <ul class="breadcrumbs">
            <li><a href="home">Home</a></li>
            <li class="divider">/</li>
            <li><a href="mark?action=all">Marks</a></li>
            <li class="divider">/</li>
            <li><a href="#" class="active">Edit Mark</a></li>
        </ul>
    </div>
    <a href="mark?action=all" class="btn-secondary">
        <i class='bx bx-arrow-back'></i> Back to Marks
    </a>
</div>

<div class="form-container">
    <p class="form-title">Update Mark Details</p>

    <form action="mark" method="POST" class="form-body">
        <input type="hidden" name="action" value="edit">
        <th:block th:if="${not empty classId}">
            <input type="hidden" name="classId" value="" th:value="${classId}">
        </th:block>
        <input type="hidden" name="enrollId" value="" th:value="${mark.enrollment.id}">
        <input type="hidden" name="assessmentId" value="" th:value="${mark.assessment.id}">

        <div class="form-row">
            <div class="form-group">
                <label>Student Enrollment (Read-only)</label>
                <input type="text" value="${mark.enrollment.student.name} - ${mark.enrollment.cls.course.code}" readonly>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Assessment (Read-only)</label>
                <input type="text" value="${mark.assessment.type} (${mark.assessment.weight}%)" readonly>
            </div>

            <div class="form-group">
                <label for="mark">Mark (0-100) <span>*</span></label>
                <input type="number" id="mark" name="mark" value="" th:value="${mark.mark}" step="0.1" min="0" max="100" required>
            </div>
        </div>

        <div class="form-buttons">

            
                <th:block th:if="${not empty classId}">
                    <a href="mark?action=viewByClass&classId=${classId}" th:href="@{|mark?action=viewByClass&classId=${classId}|}" class="btn btn-cancel">Cancel</a>
                </th:block>
                <th:block>
                    <a href="classes?action=all" class="btn btn-cancel">Cancel</a>
                </th:block>
            
            <button type="submit" class="btn btn-save">
                <i class='bx bx-save'></i> Update Mark
            </button>
        </div>
    </form>
</div>
</th:block>

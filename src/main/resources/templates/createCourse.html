<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Add New Course</title>

        <!-- Bootstrap 5 -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


        <style>
            .sidebar a, .side-menu a {
                text-decoration: none !important;
            }
        </style>
    </head>

    <body class="bg-light">

        <div class="container mt-5">
            <div class="card shadow-sm mx-auto" style="max-width: 480px;">
                <div class="card-body">

                    <h2 class="text-center mb-4 text-primary">Add New Course</h2>

                    <form action="course?action=add" method="post">

                        <div class="mb-3">
                            <label class="form-label">Code</label>
                            <input type="text" name="code" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Title</label>
                            <input type="text" name="title" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Credits</label>
                            <input type="number" name="credits" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Department Code</label>
                            <input type="text" name="departmentCode" class="form-control" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mb-3">
                            Add Course
                        </button>

                        <a href="course" class="btn btn-secondary w-100">
                            Quay láº¡i
                        </a>

                    </form>

                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    </body>
</html>

<th:block th:fragment="content">
<div class="page-header">
    <div>
        <h1 class="title">Edit Assessment</h1>
        <ul class="breadcrumbs">
            <li><a href="home">Home</a></li>
            <li class="divider">/</li>
            <li><a href="assessment?action=all">Assessment</a></li>
            <li class="divider">/</li>
            <li><a href="#" class="active">Edit Assessment</a></li>
        </ul>
    </div>
    <a href="assessment?action=all" class="btn-secondary">
        <i class='bx bx-arrow-back'></i> Back to Assessment
    </a>
</div>

<div class="form-container">

    <p class="form-title">Assessment Information</p>

    <form action="assessment" method="POST" class="form-body">

        <input type="hidden" name="action" value="edit">
        
        <div class="form-row">
            <div class="form-group">
                <label for="id">Assessment ID (Read-only)</label>
                <input type="text" id="id" name="id" 
                       value="" th:value="${assessment.id}" readonly 
                       style="background-color: #f8f8f8;">
            </div>
            <div class="form-group">
                <label for="type">Assessment Type</label>
                <select name="type" id="type" required>
                    <option value="">-- Select Type --</option>
                    <option value="Assignment" ${assessment.type == 'Assignment' ? 'selected' : ''}>Assignment</option>
                    <option value="Quiz" ${assessment.type == 'Quiz' ? 'selected' : ''}>Quiz</option>
                    <option value="Midterm Exam" ${assessment.type == 'Midterm Exam' ? 'selected' : ''}>Midterm Exam</option>
                    <option value="Final Exam" ${assessment.type == 'Final Exam' ? 'selected' : ''}>Final Exam</option>
                    <option value="Project" ${assessment.type == 'Project' ? 'selected' : ''}>Project</option>
                    <option value="Presentation" ${assessment.type == 'Presentation' ? 'selected' : ''}>Presentation</option>
                    <option value="Lab Work" ${assessment.type == 'Lab Work' ? 'selected' : ''}>Lab Work</option>
                    <option value="Practical Exam" ${assessment.type == 'Practical Exam' ? 'selected' : ''}>Practical Exam</option>
                    <option value="Other" ${assessment.type == 'Other' ? 'selected' : ''}>Other</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="weight">Assessment Weight (%)</label>
                <input type="number" min="0" max="100" id="weight" name="weight" 
                       value="" th:value="${assessment.weight}" required>
            </div>
            <div class="form-group">
                <label for="courseId" class="form-label">Course</label>
                <select name="courseId" id="courseId" required>
                    <th:block th:each="c : ${allCourse}">
                        <option value="" th:value="${c.id}" 
                                ${c.id == assessment.course.id ? 'selected' : ''}>
                            [[${c.code}]]
                        </option>
                    </th:block>
                </select>
            </div>
        </div>

        <div class="form-buttons">
            <a href="assessment?action=all" class="btn btn-cancel">Cancel</a>
            <button type="submit" class="btn btn-save">
                <i class='bx bx-save'></i> Update Assessment
            </button>
        </div>

    </form>
</div>
</th:block>

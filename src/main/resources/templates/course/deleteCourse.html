<link th:href="@{/assets/css/department.css}" rel="stylesheet" type="text/css"/>
<link th:href="@{/assets/css/form.css}" rel="stylesheet" type="text/css"/>
<th:block th:fragment="content">
<div class="page-header">
    <div>
        <h1 class="title">Delete Course</h1>
        <ul class="breadcrumbs">
            <li><a th:href="@{/home}">Home</a></li>
            <li class="divider">/</li>
            <li><a th:href="@{/course}">Courses</a></li>
            <li class="divider">/</li>
            <li><a href="#" class="active">Delete Course</a></li>
        </ul>
    </div>
    <a th:href="@{/course}" class="btn-secondary">
        <i class='bx bx-arrow-back'></i> Back to Courses
    </a>
</div>

<div class="form-container">
    <p class="form-title">Course Information</p>

    <form th:action="@{/course/delete}" method="POST" class="form-body">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <input type="hidden" name="id" th:value="${course.id}">

        <div class="form-row">
            <div class="form-group">
                <label for="code">Course Code <span>*</span></label>
                <input type="text" id="code" name="code" th:value="${course.code}" readonly>
            </div>
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" th:value="${course.title}" readonly>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="credits">Credits</label>
                <input type="text" id="credits" name="credits" th:value="${course.credits}" readonly>
            </div>
            <div class="form-group">
                <label for="departmentCode">Department Code</label>
                <input type="text" id="departmentCode" name="departmentCode" th:value="${course.department != null ? course.department.code : ''}" readonly>
            </div>
        </div>

        <div class="form-buttons">
            <a th:href="@{/course}" class="btn btn-cancel">Cancel</a>
            <button type="submit" class="btn btn-save">
                <i class='bx bx-save'></i> Delete Course
            </button>
        </div>
    </form>
</div>
</th:block>

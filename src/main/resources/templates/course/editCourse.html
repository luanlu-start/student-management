<link th:href="@{/assets/css/department.css}" rel="stylesheet" type="text/css"/>
<link th:href="@{/assets/css/form.css}" rel="stylesheet" type="text/css"/>
<th:block th:fragment="content">
    <div class="page-header">
        <div>
            <h1 class="title">Edit Course</h1>
            <ul class="breadcrumbs">
                <li><a th:href="@{/home}">Home</a></li>
                <li class="divider">/</li>
                <li><a th:href="@{/course}">Courses</a></li>
                <li class="divider">/</li>
                <li><a href="#" class="active">Edit Course</a></li>
            </ul>
        </div>
        <a th:href="@{/course}" class="btn-secondary">
            <i class='bx bx-arrow-back'></i> Back to Courses
        </a>
    </div>

    <div class="form-container">

        <th:block th:if="${errorMsg != null}">
            <div class="alert-box warning" style="margin: 0 24px 24px 24px;">[[${errorMsg}]]</div>
        </th:block>

        <p class="form-title">Course Information</p>

        <form th:action="@{/course/update}"
              th:object="${course}"
              method="POST"
              class="form-body">

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" th:field="*{id}">

            <div class="form-group">
                <label for="code">Course Code <span>*</span></label>
                <input type="text" id="code" th:field="*{code}" required>
                <div class="text-danger"
                     th:if="${#fields.hasErrors('code')}"
                     th:errors="*{code}"></div>
            </div>

            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" th:field="*{title}">
                <div class="text-danger"
                     th:if="${#fields.hasErrors('title')}"
                     th:errors="*{title}"></div>
            </div>

            <div class="form-group">
                <label for="credits">Credits</label>
                <input type="text" id="credits" th:field="*{credits}">
                <div class="text-danger"
                     th:if="${#fields.hasErrors('credits')}"
                     th:errors="*{credits}"></div>
            </div>

            <div class="form-group">
                <label for="departmentCode">Department</label>
                <select id="departmentCode" th:field="*{departmentCode}" required>
                    <option th:each="dep : ${listDepartment}"
                            th:value="${dep.code}"
                            th:text="${dep.name + ' (' + dep.code + ')'}">
                    </option>
                </select>
                <div class="text-danger"
                     th:if="${#fields.hasErrors('departmentCode')}"
                     th:errors="*{departmentCode}"></div>
            </div>

            <div class="form-buttons">
                <a th:href="@{/course}" class="btn btn-cancel">Cancel</a>
                <button type="submit" class="btn btn-save">
                    <i class='bx bx-save'></i> Update Course
                </button>
            </div>

        </form>
    </div>
</th:block>

<link th:href="@{/assets/css/department.css}" rel="stylesheet" type="text/css"/>
<link th:href="@{/assets/css/form.css}" rel="stylesheet" type="text/css"/>
<th:block th:fragment="content">
<div class="page-header">
    <div>
        <h1 class="title">Add New Course</h1>
        <ul class="breadcrumbs">
            <li><a th:href="@{/home}">Home</a></li>
            <li class="divider">/</li>
            <li><a th:href="@{/course}">Courses</a></li>
            <li class="divider">/</li>
            <li><a href="#" class="active">Add New Course</a></li>
        </ul>
    </div>
    <a th:href="@{/course}" class="btn-secondary">
        <i class='bx bx-arrow-back'></i> Back to Courses
    </a>
</div>

<div class="form-container">
    <p class="form-title">Course Information</p>

    <form th:action="@{/course/create}" method="post" class="form-body">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <div class="form-row">
            <div class="form-group">
                <label for="code">Course Code <span>*</span></label>
                <input type="text" id="code" name="code" required>
            </div>
            <div class="form-group">
                <label for="title">Title <span>*</span></label>
                <input type="text" id="title" name="title" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="credits">Credits <span>*</span></label>
                <input type="number" id="credits" name="credits" min="1" required>
            </div>
            <div class="form-group">
                <label for="departmentCode">Department <span>*</span></label>
                <select id="departmentCode" name="department.code" required>
                    <option value="" disabled selected>Choose department</option>
                    <option th:each="dep : ${listDepartment}"
                            th:value="${dep.code}"
                            th:text="${dep.name + ' (' + dep.code + ')'}">
                    </option>
                </select>
            </div>
        </div>

        <div class="form-buttons">
            <a th:href="@{/course}" class="btn btn-cancel">Cancel</a>
            <button type="submit" class="btn btn-save">
                <i class='bx bx-save'></i> Add Course
            </button>
        </div>
    </form>
</div>
</th:block>

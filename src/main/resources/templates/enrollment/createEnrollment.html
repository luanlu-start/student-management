﻿<link th:href="@{/assets/css/department.css}" rel="stylesheet" type="text/css"/>
<link th:href="@{/assets/css/form.css}" rel="stylesheet" type="text/css"/>
<th:block th:fragment="content">
<style>
    .search-select-wrapper {
        position: relative;
        width: 100%;
    }
    
    .search-select-input {
        width: 100%;
        padding: 10px 40px 10px 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 14px;
        transition: all 0.3s;
    }
    
    .search-select-input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .search-icon {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: #7f8c8d;
        pointer-events: none;
    }
    
    .dropdown-list {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        max-height: 300px;
        overflow-y: auto;
        background: white;
        border: 1px solid #ddd;
        border-top: none;
        border-radius: 0 0 8px 8px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        z-index: 1000;
        display: none;
    }
    
    .dropdown-list.show {
        display: block;
    }
    
    .dropdown-item {
        padding: 12px;
        cursor: pointer;
        border-bottom: 1px solid #f0f0f0;
        transition: background 0.2s;
    }
    
    .dropdown-item:hover {
        background: #f8f9fa;
    }
    
    .dropdown-item.selected {
        background: #e3e7ff;
        color: #667eea;
        font-weight: 500;
    }
    
    .student-info {
        display: flex;
        align-items: center;
        gap: 10px;
    }
    
    .student-id {
        font-weight: 600;
        color: #2c3e50;
    }
    
    .student-name {
        color: #7f8c8d;
    }
    
    .no-results {
        padding: 20px;
        text-align: center;
        color: #7f8c8d;
        font-style: italic;
    }
    
    .selected-student-display {
        margin-top: 10px;
        padding: 10px;
        background: #e3e7ff;
        border-radius: 6px;
        color: #667eea;
        font-weight: 500;
        display: none;
    }
    
    .selected-student-display.show {
        display: block;
    }
</style>

<div class="page-header">
    <div>
        <h1 class="title">Add New Enrollment</h1>
        <ul class="breadcrumbs">
            <li><a th:href="@{/home}">Home</a></li>
            <li class="divider">/</li>
            <li><a th:href="@{/classes}">Classes</a></li>
            <li class="divider">/</li>
            <li><a href="#" class="active">Add New Enrollment</a></li>
        </ul>
    </div>
    <a th:href="@{/classes}" class="btn-secondary">
        <i class='bx bx-arrow-back'></i> Back to Classes
    </a>
</div>

<div class="form-container">

    <p class="form-title">Enrollment Information</p>

    <form th:action="@{/enrollment/addStudent}" method="POST" class="form-body">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <div class="form-row">

            <div class="form-group">
                <label for="studentSearch" class="form-label">Search Student by ID or Name</label>
                <div class="search-select-wrapper">
                    <input type="text" 
                           required
                           id="studentSearch"
                           class="search-select-input" 
                           placeholder="Type student ID or name..."
                           autocomplete="off">
                    <i class='bx bx-search search-icon'></i>
                    
                    <div id="studentDropdown" class="dropdown-list">
                        <th:block th:each="s : ${allStudent}">
                            <div class="dropdown-item"
                                 th:attr="data-id=${s.id},data-name=${s.name}">
                                <div class="student-info">
                                    <span class="student-id">[[${s.id}]]</span>
                                    <span>-</span>
                                    <span class="student-name">[[${s.name}]]</span>
                                </div>
                            </div>
                        </th:block>
                    </div>
                </div>
                
                <div id="selectedStudentDisplay" class="selected-student-display"></div>
                
                <!-- Hidden input để submit -->
                <input type="hidden" name="studentId" id="studentIdHidden" required>
            </div>

            <div class="form-group">
                <label for="classId" class="form-label">Class</label>
                <select name="classId" id="classId" required th:style="${preSelectedClassId != null} ? 'background-color: #e3e7ff;' : ''">
                    <option value="">-- Select Class --</option>
                    <th:block th:each="c : ${allClass}">
                        <option th:value="${c.id}" th:selected="${preSelectedClassId != null and c.id == preSelectedClassId}">
                            [[${c.code}]] - [[${c.course.code}]]
                        </option>
                    </th:block>
                </select>
                <th:block th:if="${preSelectedClassId != null}">
                    <small style="color: #667eea; margin-top: 5px; display: block;">
                        <i class='bx bx-info-circle'></i> Class pre-selected from previous page
                    </small>
                </th:block>
            </div>
        </div>
        
        <div class="form-buttons">
            <a th:href="@{/classes}" class="btn btn-cancel">Cancel</a>
            <button type="submit" class="btn btn-save">
                <i class='bx bx-save'></i> Add Enrollment
            </button>
        </div>

    </form>
</div>

<script>
    const searchInput = document.getElementById('studentSearch');
    const dropdown = document.getElementById('studentDropdown');
    const hiddenInput = document.getElementById('studentIdHidden');
    const selectedDisplay = document.getElementById('selectedStudentDisplay');
    const allItems = dropdown.querySelectorAll('.dropdown-item');
    
    // Show dropdown when input is focused
    searchInput.addEventListener('focus', function() {
        if (searchInput.value.trim() === '') {
            dropdown.classList.add('show');
        }
    });
    
    // Filter students based on search input
    searchInput.addEventListener('input', function() {
        const searchTerm = this.value.toLowerCase().trim();
        let hasResults = false;
        
        allItems.forEach(item => {
            const studentId = item.getAttribute('data-id').toLowerCase();
            const studentName = item.getAttribute('data-name').toLowerCase();
            
            if (studentId.includes(searchTerm) || studentName.includes(searchTerm)) {
                item.style.display = 'block';
                hasResults = true;
            } else {
                item.style.display = 'none';
            }
        });
        
        // Show/hide dropdown
        if (searchTerm === '') {
            dropdown.classList.add('show');
        } else if (hasResults) {
            dropdown.classList.add('show');
        } else {
            dropdown.classList.remove('show');
        }
        
        // Show "no results" message if needed
        const noResultsMsg = dropdown.querySelector('.no-results');
        if (!hasResults && searchTerm !== '') {
            if (!noResultsMsg) {
                const noResults = document.createElement('div');
                noResults.className = 'no-results';
                noResults.textContent = 'No students found';
                dropdown.appendChild(noResults);
            }
        } else if (noResultsMsg) {
            noResultsMsg.remove();
        }
    });
    
    // Event delegation: click on any dropdown-item
    dropdown.addEventListener('click', function(e) {
        const item = e.target.closest('.dropdown-item');
        if (!item) return;
        const id = item.getAttribute('data-id');
        const name = item.getAttribute('data-name');
        hiddenInput.value = id;
        searchInput.value = id + ' - ' + name;
        dropdown.classList.remove('show');

        selectedDisplay.textContent = '✓ Selected: ' + id + ' - ' + name;
        selectedDisplay.classList.add('show');

        allItems.forEach(function(el) {
            if (el.getAttribute('data-id') === id) {
                el.classList.add('selected');
            } else {
                el.classList.remove('selected');
            }
        });
    });

    // Close dropdown when clicking outside
    document.addEventListener('click', function(e) {
        if (!e.target.closest('.search-select-wrapper')) {
            dropdown.classList.remove('show');
        }
    });
    
    // Prevent form submission if no student selected
    document.querySelector('form').addEventListener('submit', function(e) {
        if (!hiddenInput.value) {
            e.preventDefault();
            alert('Please select a student');
            searchInput.focus();
        }
    });
</script>
</th:block>

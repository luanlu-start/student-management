<link th:href="@{/assets/css/department.css}" rel="stylesheet" type="text/css"/>
<link th:href="@{/assets/css/form.css}" rel="stylesheet" type="text/css"/>
<th:block th:fragment="content">
<div class="page-header">
    <div>
        <h1 class="title">Delete Enrollment</h1>
        <ul class="breadcrumbs">
            <li><a th:href="@{/home}">Home</a></li>
            <li class="divider">/</li>
            <li><a th:href="@{/classes}">Classes</a></li>
            <li class="divider">/</li>
            <li><a href="#" class="active">Delete Enrollment</a></li>
        </ul>
    </div>
    <a th:href="@{/classes}" class="btn-secondary">
        <i class='bx bx-arrow-back'></i> Back to Classes
    </a>
</div>

<div class="form-container">

    <p class="form-title">Are you sure you want to delete this enrollment ?</p>

    <form th:action="@{/enrollment/confirmDeleteStudent}" method="POST" class="form-body">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        
        <div class="form-row">
            <div class="form-group">
                <label for="idShow">Student ID</label>
                <input type="hidden" name="student.id" th:value="${student.id}">
                <input type="text" id="idShow" name="idShow"
                       value="" th:value="${student.id}" disabled
                       style="background-color: #f8f8f8;">
            </div>
            <div class="form-group">
                <label for="name">Student Name </label>
                <input type="text" id="name" name="name"
                       value="" th:value="${student.name}" disabled>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="ClassIdShow">Class ID</label>
                <input type="text" id="ClassIdShow" name="ClassIdShow"
                       value="" th:value="${classes.id}" disabled>
                <input type="hidden" name="cls.id" th:value="${classes.id}">
            </div>
            <div class="form-group">
                <label for="code">Class Code </label>
                <input type="text" id="code" name="code"
                       value="" th:value="${classes.code}" disabled>
            </div>
        </div>

        <div class="form-buttons">
            <a th:href="@{/classes}" class="btn btn-cancel">Cancel</a>
            <button type="submit" class="btn btn-save">
                <i class='bx bx-save'></i> Delete Enrollment
            </button>
        </div>

    </form>
</div>
</th:block>

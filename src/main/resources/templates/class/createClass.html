<link th:href="@{/assets/css/department.css}" rel="stylesheet" type="text/css"/>
<link th:href="@{/assets/css/form.css}" rel="stylesheet" type="text/css"/>
<th:block th:fragment="content">
    <div class="page-header">
        <div>
            <h1 class="title">Add New Class</h1>
            <ul class="breadcrumbs">
                <li><a th:href="@{/home}">Home</a></li>
                <li class="divider">/</li>
                <li><a th:href="@{/classes}">Classes</a></li>
                <li class="divider">/</li>
                <li><a href="#" class="active">Add Class</a></li>
            </ul>
        </div>
        <a th:href="@{/classes}" class="btn-secondary">
            <i class='bx bx-arrow-back'></i> Back to Classes
        </a>
    </div>

    <div class="form-container">
        <p class="form-title">New Class Information</p>

        <form th:action="@{/classes/add}"
              th:object="${classDTO}"
              method="POST"
              class="form-body">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>


            <div class="form-row">
                <div class="form-group full-width">
                    <label for="code">Class Code <span>*</span></label>

                    <input type="text" id="code" name="code"
                           th:field="*{code}"
                           placeholder="E.g: PRO192.FA24.SE1801"
                           pattern="[A-Z]{3}[0-9]{3}\.[A-Z]{2}[0-9]{2}\.[A-Z]{2}[0-9]{4}"
                           title="Must match format: XXX123.XX12.XX1234"
                           required>

                    <small class="text-danger" th:if="${#fields.hasErrors('code')}" th:errors="*{code}"></small>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="courseId">Course <span>*</span></label>
                    <select id="courseId" class="form-select"
                            th:field="*{courseId}" required>
                        <option value=""
                                th:selected="${classDTO.courseId == null}">
                            -- Select a Course --
                        </option>
                        <option th:each="course : ${listCourse}"
                                th:value="${course.id}"
                                th:text="${course.code + ' - ' + course.title}">
                        </option>
                    </select>

                    <small class="text-danger" th:if="${#fields.hasErrors('courseId')}" th:errors="*{courseId}"></small>
                </div>
                <div class="form-group">
                    <label for="semesterId">Semester <span>*</span></label>
                    <select id="semesterId" class="form-select"
                            th:field="*{semesterId}" required>
                        <option value=""
                                th:selected="${classDTO.semesterId == null}">
                            -- Select a Semester --
                        </option>
                        <option th:each="sem : ${listSemester}"
                                th:value="${sem.id}"
                                th:text="${sem.code + ' - ' + sem.year}">
                        </option>
                    </select>
                    <small class="text-danger" th:if="${#fields.hasErrors('semesterId')}"
                           th:errors="*{semesterId}"></small>
                </div>
            </div>

            <div class="form-row" style="grid-template-columns: 2fr 1fr 1fr;">
                <div class="form-group">
                    <label for="lecturerId">Lecturer <span>*</span></label>
                    <select id="lecturerId" class="form-select"
                            th:field="*{lecturerId}" required>
                        <option value=""
                                th:selected="${classDTO.lecturerId == null}">
                            -- Select a Lecturer --
                        </option>
                        <option th:each="lec : ${listLecturer}"
                                th:value="${lec.id}"
                                th:text="${lec.name + ' (' + lec.email + ')'}">
                        </option>
                    </select>
                    <small class="text-danger" th:if="${#fields.hasErrors('lecturerId')}"
                           th:errors="*{lecturerId}"></small>
                </div>
                <div class="form-group">
                    <label for="room">Room</label>

                    <input type="text" id="room" name="room"
                           th:field="*{room}"
                           placeholder="E.g: BE.301"
                           pattern="[A-Z]{2}\.[0-9]{3}">

                    <small class="text-danger" th:if="${#fields.hasErrors('room')}" th:errors="*{room}"></small>
                </div>
                <div class="form-group">
                    <label for="schedule">Schedule</label>

                    <input type="text" id="schedule" name="schedule"
                           th:field="*{schedule}"
                           placeholder="E.g: Mon(7-9), Wed(7-9)"
                           pattern="[A-Za-z0-9(),\- ]+">

                    <small class="text-danger" th:if="${#fields.hasErrors('schedule')}" th:errors="*{schedule}"></small>
                </div>
            </div>

            <div class="form-buttons">
                <a th:href="@{/classes}" class="btn btn-cancel">Cancel</a>
                <button type="submit" class="btn btn-save">
                    <i class='bx bx-plus'></i> Add New Class
                </button>
            </div>
        </form>
    </div>
</th:block>
